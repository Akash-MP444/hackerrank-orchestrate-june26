# Per-1M-token USD pricing for cost estimation in evaluation/run_eval.py.
#
# Looked up live (web search, not memorized) on 2026-06-19 from Google's published
# Gemini API rates, cross-checked against two independent pricing trackers
# (pricepertoken.com, OpenRouter). Gemini 2.5 Flash text/image input and output are
# billed at the same per-token rate regardless of modality.
#
# Re-check https://ai.google.dev/gemini-api/docs/pricing before trusting this for a
# real budget — provider pricing changes, and this file is a snapshot, not a live feed.
gemini-2.5-flash:
  input_per_million_usd: 0.30
  output_per_million_usd: 2.50
  notes: >
    Verified 2026-06-19. Image input tokens are billed at the same input rate as text
    on this model; exact image-token count depends on resolution (see Google's vision
    token-counting docs) and is therefore an estimate, not a measured value, until
    computed from your provider's actual tokenizer/usage metadata on real calls.

# Fallback used only if the model name isn't found above (keeps run_eval.py from
# crashing on a misconfigured GEMINI_MODEL; cost line will be marked as unestimated).
_default:
  input_per_million_usd: null
  output_per_million_usd: null
  notes: "No pricing entry for this model; cost estimate skipped."